<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachLab</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e1117;--sur:#161b22;--sur2:#1c2333;--sur3:#21262d;
  --bdr:#30363d;--bdr2:#21262d;
  --green:#2ea043;--gb:#3fb950;--gd:#196127;
  --blue:#1f6feb;--bb:#58a6ff;
  --org:#d29922;--ob:#e3b341;
  --red:#da3633;--rb:#f85149;
  --pur:#8b5cf6;--pb:#a78bfa;
  --txt:#e6edf3;--txt2:#8b949e;--txt3:#6e7681;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--txt);min-height:100vh;font-size:14px}
h1,h2,h3,h4{font-family:'Rajdhani',sans-serif;letter-spacing:.04em}
button,select,input,textarea{font-family:'Inter',sans-serif;outline:none;border:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

.shell{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 1.25rem;display:flex;align-items:center;gap:.75rem;height:52px;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:var(--gb);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo-text{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.logo-text span{color:var(--gb)}
.nav{display:flex;gap:.15rem;flex:1;justify-content:center}
.nbtn{padding:.32rem .7rem;border-radius:5px;font-size:.82rem;font-weight:600;color:var(--txt2);background:transparent;cursor:pointer;transition:all .15s;font-family:'Rajdhani',sans-serif;letter-spacing:.04em;white-space:nowrap}
.nbtn:hover{background:var(--sur2);color:var(--txt)}
.nbtn.on{background:var(--gd);color:var(--gb);border:1px solid var(--green)}
.topbar-right{display:flex;gap:.5rem;align-items:center;flex-shrink:0}

.main{flex:1;padding:1.25rem;max-width:1400px;margin:0 auto;width:100%}

.card{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.ch{padding:.7rem 1rem;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;gap:.5rem}
.ct{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;letter-spacing:.05em}
.cb{padding:.9rem}

.btn{padding:.42rem .85rem;border-radius:5px;font-size:.79rem;font-weight:500;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.35rem;border:1px solid transparent;white-space:nowrap}
.btn-p{background:var(--gb);color:#0e1117;border-color:var(--gb)}
.btn-p:hover{background:#52d166}
.btn-s{background:var(--sur2);color:var(--txt);border-color:var(--bdr)}
.btn-s:hover{background:var(--sur3)}
.btn-g{background:transparent;color:var(--txt2)}
.btn-g:hover{background:var(--sur2);color:var(--txt)}
.btn-r{background:transparent;color:var(--rb);border-color:var(--red)}
.btn-r:hover{background:var(--red);color:#fff}
.btn-sm{padding:.26rem .58rem;font-size:.74rem}
.btn-xs{padding:.14rem .42rem;font-size:.69rem}

.inp{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);padding:.42rem .7rem;font-size:.82rem;width:100%;transition:border .15s}
.inp:focus{border-color:var(--gb)}
.inp::placeholder{color:var(--txt3)}
.sel{background:var(--sur2);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);padding:.38rem .7rem;font-size:.82rem;cursor:pointer;width:100%}
.sel:focus{border-color:var(--gb)}
.lbl{display:block;font-size:.73rem;font-weight:500;color:var(--txt2);margin-bottom:.28rem;letter-spacing:.03em}

.bdg{display:inline-flex;align-items:center;padding:.13rem .48rem;border-radius:4px;font-size:.69rem;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.bdg-g{background:rgba(46,160,67,.15);color:var(--gb);border:1px solid rgba(46,160,67,.3)}
.bdg-b{background:rgba(31,111,235,.15);color:var(--bb);border:1px solid rgba(31,111,235,.3)}
.bdg-o{background:rgba(210,153,34,.15);color:var(--ob);border:1px solid rgba(210,153,34,.3)}
.bdg-r{background:rgba(218,54,51,.15);color:var(--rb);border:1px solid rgba(218,54,51,.3)}
.bdg-p{background:rgba(139,92,246,.15);color:var(--pb);border:1px solid rgba(139,92,246,.3)}
.bdg-grey{background:var(--sur2);color:var(--txt2);border:1px solid var(--bdr)}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}

.stile{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:.7rem;text-align:center}
.sval{font-family:'Rajdhani',sans-serif;font-size:1.7rem;font-weight:700;line-height:1}
.slbl{font-size:.66rem;color:var(--txt2);margin-top:.18rem;letter-spacing:.05em;text-transform:uppercase}

.rbar-wrap{display:flex;align-items:center;gap:.4rem}
.rbar-track{flex:1;height:5px;background:var(--sur3);border-radius:3px;overflow:hidden}
.rbar-fill{height:100%;border-radius:3px;transition:width .3s}
.rval{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;width:1.6rem;text-align:right}

.prow{display:flex;align-items:center;gap:.6rem;padding:.5rem .85rem;border-bottom:1px solid var(--bdr2);cursor:pointer;transition:background .1s}
.prow:hover{background:var(--sur2)}
.prow:last-child{border-bottom:none}
.prow.active{background:var(--sur2)}
.pavatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:.78rem;font-weight:700;flex-shrink:0}

.pitch{position:relative;background:linear-gradient(180deg,#1a4020,#1e4a25 50%,#1a4020);border-radius:8px;overflow:hidden;border:2px solid #2d5a34}
.pp{position:absolute;transform:translate(-50%,-50%);width:38px;height:38px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;border:2px solid rgba(255,255,255,.3);font-family:'Rajdhani',sans-serif;box-shadow:0 2px 8px rgba(0,0,0,.5);text-align:center;line-height:1.2;padding:2px}

.scard{background:var(--sur2);border:1px solid var(--bdr);border-radius:7px;padding:.8rem;transition:border-color .15s;cursor:pointer}
.scard:hover{border-color:var(--gb)}
.scard.exp{border-color:var(--gb);background:var(--sur3)}
.sname{font-family:'Rajdhani',sans-serif;font-size:.93rem;font-weight:700;letter-spacing:.03em;margin-bottom:.32rem}
.smeta{display:flex;flex-wrap:wrap;gap:.22rem;margin-bottom:.38rem}
.stags{display:flex;flex-wrap:wrap;gap:.18rem}
.sdesc{font-size:.76rem;color:var(--txt2);line-height:1.5;margin-top:.5rem;border-top:1px solid var(--bdr2);padding-top:.5rem}
.sbar{height:3px;background:var(--sur3);border-radius:2px;margin-top:.42rem;overflow:hidden}
.sbar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--green),var(--gb))}

.gmphase{border:1px solid var(--bdr);border-radius:7px;overflow:hidden;margin-bottom:.6rem}
.gmhead{padding:.55rem .9rem;background:var(--sur2);display:flex;align-items:center;gap:.4rem;cursor:pointer}
.gmhead:hover{background:var(--sur3)}
.gmbody{padding:.6rem .9rem;display:flex;flex-wrap:wrap;gap:.3rem}
.gmopt{padding:.22rem .55rem;border-radius:4px;font-size:.73rem;cursor:pointer;border:1px solid var(--bdr);background:transparent;color:var(--txt2);transition:all .15s}
.gmopt:hover{border-color:var(--txt3);color:var(--txt)}
.gmopt.on{background:rgba(46,160,67,.12);border-color:var(--green);color:var(--gb)}

.agrp{margin-bottom:1rem}
.agrp-lbl{font-family:'Rajdhani',sans-serif;font-size:.73rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--txt3);margin-bottom:.4rem}
.arow{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
.aname{font-size:.77rem;color:var(--txt2);width:128px;flex-shrink:0}

.chip{display:inline-flex;align-items:center;padding:.1rem .38rem;border-radius:3px;font-size:.66rem;font-weight:500;background:var(--sur3);color:var(--txt2);border:1px solid var(--bdr2)}
.empty{padding:2.5rem;text-align:center;color:var(--txt3)}
.empty-icon{font-size:2rem;margin-bottom:.55rem}
.empty-title{font-family:'Rajdhani',sans-serif;font-size:.98rem;font-weight:700;color:var(--txt2);margin-bottom:.28rem}
.scroll{overflow-y:auto}
.alert-i{background:rgba(31,111,235,.1);border:1px solid rgba(31,111,235,.3);color:var(--bb);padding:.6rem .85rem;border-radius:5px;font-size:.79rem}
.frow{display:flex;gap:.6rem;margin-bottom:.6rem}
.fgrp{flex:1;display:flex;flex-direction:column;gap:.22rem}
.sep{height:1px;background:var(--bdr);margin:.65rem 0}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.6rem}

/* TEAM SWITCHER */
.team-pill{padding:.32rem .7rem;border-radius:5px;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt2);font-family:'Rajdhani',sans-serif;letter-spacing:.04em;white-space:nowrap}
.team-pill:hover{border-color:var(--txt3);color:var(--txt)}
.team-pill.active{border-color:var(--gb);color:var(--gb);background:rgba(63,185,80,.1)}

/* SEASON PLANNER */
.meso{border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-bottom:.75rem}
.meso-header{padding:.65rem 1rem;background:var(--sur2);display:flex;align-items:center;gap:.6rem;cursor:pointer}
.meso-header:hover{background:var(--sur3)}
.week-row{display:grid;grid-template-columns:80px 1fr 1fr;gap:.5rem;padding:.5rem 1rem;border-bottom:1px solid var(--bdr2);align-items:start}
.week-row:last-child{border-bottom:none}
.week-lbl{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:var(--txt3);padding-top:.2rem}
.session-slot{background:var(--sur3);border:1px solid var(--bdr2);border-radius:5px;padding:.4rem .6rem;min-height:48px;cursor:pointer;transition:all .15s}
.session-slot:hover{border-color:var(--txt3)}
.session-slot.planned{border-color:var(--bb);background:rgba(31,111,235,.08)}
.session-slot.done{border-color:var(--green);background:rgba(46,160,67,.08)}
.session-slot.empty-slot{display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:.72rem}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
.modal-header{padding:.85rem 1.1rem;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--sur);z-index:1}

/* RATING SCALE 1-20 */
.rating-btns{display:flex;gap:.18rem;flex-wrap:wrap}
.rbtn{width:26px;height:26px;border-radius:4px;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt3);font-size:.7rem;font-weight:700;cursor:pointer;transition:all .12s;font-family:'Rajdhani',sans-serif;display:flex;align-items:center;justify-content:center}
.rbtn:hover{border-color:var(--txt3);color:var(--txt)}
.rbtn.on{color:#0e1117}

/* POSITION BADGES */
.pos-grid{display:flex;flex-wrap:wrap;gap:.3rem}
.pos-btn{padding:.22rem .5rem;border-radius:4px;font-size:.72rem;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--sur2);color:var(--txt3);transition:all .12s;font-family:'Rajdhani',sans-serif}
.pos-btn:hover{border-color:var(--txt3);color:var(--txt)}
.pos-btn.primary{border-color:var(--ob);background:rgba(210,153,34,.15);color:var(--ob)}
.pos-btn.secondary{border-color:var(--bb);background:rgba(31,111,235,.12);color:var(--bb)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useMemo, useEffect, useRef} = React;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────

const ALL_POSITIONS = ['GK','CB','LB','RB','LWB','RWB','DM','CM','AM','LM','RM','LW','RW','CF','ST'];

const FORMATIONS_9 = ['2-3-1-2','3-2-3','2-4-2','3-3-2','3-2-2-1','2-3-3','1-3-2-2','3-1-3-1'];
const FORMATIONS_11 = ['4-3-3','4-4-2','4-2-3-1','3-4-3','3-5-2','4-1-4-1','5-3-2','4-3-2-1','3-4-2-1','4-5-1','5-4-1','4-1-3-2','3-3-3-1','4-4-1-1'];

const AGE_GROUPS = {'U7-U10':'U7–U10','U11-U14':'U11–U14','U15-U18':'U15–U18','Adult':'Adult'};

const ATTRS = {
  Technical: ['first_touch','passing_short','passing_long','receiving','dribbling','ball_control','finishing','shooting','crossing','heading','shielding'],
  Physical:  ['speed','agility','stamina','strength','coordination','reactions','jumping'],
  Tactical:  ['positioning','pressing','transition_attack','transition_defence','decision_making','scanning_awareness','shape_and_structure','width_and_depth','combinations','defensive_organisation'],
  Mental:    ['communication','leadership','composure','concentration','coachability','competitiveness'],
};

// Age-appropriate attribute subsets
const ATTRS_YOUTH = {
  Technical:       ['first_touch','ball_mastery_dribbling','attacking_1v1','passing_quality','receiving_body_shape','finishing_technique'],
  Tactical:        ['decision_making','movement_support','defensive_awareness','transition_reaction'],
  Physical:        ['agility_coordination','work_rate','physical_confidence'],
  Psychological:   ['coachability','confidence_bravery','resilience'],
  Social:           ['communication','respect_team'],
};
const ATTRS_U10 = ATTRS_YOUTH;
const ATTRS_U14 = ATTRS_YOUTH;
function getAttrs(ageGroup) {
  if (ageGroup==='U7-U10') return ATTRS_U10;
  if (ageGroup==='U11-U14') return ATTRS_U14;
  return ATTRS;
}
function grpLabel(grp) {
  const map = {Social:'Social / Team',Technical:'Technical',Tactical:'Tactical',Physical:'Physical',Mental:'Mental',Psychological:'Psychological'};
  return map[grp]||grp;
}
function getAllAttrKeys(ageGroup) {
  return Object.values(getAttrs(ageGroup)).flat();
}
function buildCategorizedRatings(ageGroup, ratings={}) {
  const grouped = {};
  Object.entries(getAttrs(ageGroup)).forEach(([grp, attrs]) => {
    const values = {};
    attrs.forEach(attr => {
      if (typeof ratings[attr] === 'number' && ratings[attr] > 0) values[attr] = ratings[attr];
    });
    grouped[grp] = {label: grpLabel(grp), ratings: values};
  });
  return grouped;
}
function normalizePlayer(player, ageGroup) {
  const coachRatings = player.coachRatings || {};
  const selfRatings = player.selfRatings || {};
  const snapshots = (player.snapshots || []).map(s => ({
    ...s,
    ratings: s.ratings || {},
    categories: s.categories || buildCategorizedRatings(ageGroup, s.ratings || {}),
  }));
  return {
    ...player,
    coachRatings,
    selfRatings,
    coachRatingCategories: player.coachRatingCategories || buildCategorizedRatings(ageGroup, coachRatings),
    selfRatingCategories: player.selfRatingCategories || buildCategorizedRatings(ageGroup, selfRatings),
    snapshots,
  };
}
function normalizeTeam(team) {
  return {
    ...team,
    squad: (team.squad || []).map(player => normalizePlayer(player, team.ageGroup || 'U15-U18')),
  };
}
function buildEliteMatchPayload(player, team) {
  return {
    _type: 'coachlab_elite_match_request',
    requestedAt: new Date().toISOString(),
    team: {
      id: team.id,
      name: team.name,
      ageGroup: team.ageGroup,
    },
    player: {
      id: player.id,
      name: player.name,
      primaryPos: player.primaryPos,
      secondaryPos: player.secondaryPos || [],
      coachRatings: player.coachRatings || {},
      coachRatingCategories: player.coachRatingCategories || buildCategorizedRatings(team.ageGroup, player.coachRatings || {}),
      notes: player.notes || '',
      wellbeing: player.wellbeing || {},
      goals: player.goals || {},
      snapshots: player.snapshots || [],
    },
  };
}
function buildSnapshotPayload(player, team, snapshot) {
  return {
    _type: 'coachlab_player_snapshot',
    savedAt: new Date().toISOString(),
    team: {
      id: team.id,
      name: team.name,
      ageGroup: team.ageGroup,
    },
    player: {
      id: player.id,
      name: player.name,
      primaryPos: player.primaryPos,
      secondaryPos: player.secondaryPos || [],
      coachRatings: player.coachRatings || {},
      coachRatingCategories: player.coachRatingCategories || buildCategorizedRatings(team.ageGroup, player.coachRatings || {}),
      notes: player.notes || '',
      wellbeing: player.wellbeing || {},
      goals: player.goals || {},
    },
    snapshot,
  };
}

const ATTR_LBL = {
  first_touch:'First Touch',passing_short:'Short Pass',passing_long:'Long Pass',receiving:'Receiving',dribbling:'Dribbling',ball_control:'Ball Control',finishing:'Finishing',shooting:'Shooting',crossing:'Crossing',heading:'Heading',shielding:'Shielding',
  speed:'Speed',agility:'Agility',stamina:'Stamina',strength:'Strength',coordination:'Coordination',reactions:'Reactions',jumping:'Jumping',
  positioning:'Positioning',pressing:'Pressing',transition_attack:'Trans. Attack',transition_defence:'Trans. Defence',decision_making:'Decision Making',scanning_awareness:'Scanning',shape_and_structure:'Shape & Structure',width_and_depth:'Width & Depth',combinations:'Combinations',defensive_organisation:'Def. Organisation',
  communication:'Communication',leadership:'Leadership',composure:'Composure',concentration:'Concentration',coachability:'Coachability',competitiveness:'Competitiveness',
  // U11-U14 specific
  ball_mastery_dribbling:'Ball Mastery & Dribbling',
  attacking_1v1:'1v1 Attacking',
  passing_quality:'Passing Quality',
  receiving_body_shape:'Receiving & Body Shape',
  finishing_technique:'Finishing Technique',
  movement_support:'Movement to Support',
  defensive_awareness:'Defensive Awareness',
  transition_reaction:'Transition Reaction',
  agility_coordination:'Agility & Coordination',
  work_rate:'Work Rate',
  physical_confidence:'Physical Confidence',
  confidence_bravery:'Confidence & Bravery',
  resilience:'Resilience',
  respect_team:'Respect & Team Behaviour',
  Social:'Social / Team',
};

const GM = {
  P1:{label:'In Possession',color:'#3fb950',icon:'⚽',opts:['Build from the back','Play direct to forwards','Dominate possession','Use width to stretch','Overload central areas','Create space with movement','Positional play — structured spaces','Third man combinations','Overload then switch quickly','GK as extra outfield player']},
  P2:{label:'Transition Out',color:'#e3b341',icon:'⚠️',opts:['Press immediately to win back','Drop into shape quickly','Delay to allow reorganisation','Win second balls aggressively','Counter-press at point of loss','Protect space in behind first','Use pressing traps','Designated pressers, others recover']},
  P3:{label:'Out of Possession',color:'#f85149',icon:'🛡️',opts:['High press — win ball high','Mid-block — defend from midfield','Low block — protect shape','Press on triggers','Force play wide','Stay compact and organised','Zonal marking structure','High defensive line','Defensive line management']},
  P4:{label:'Transition In',color:'#58a6ff',icon:'🚀',opts:['Attack before opposition reorganises','Play forward to strikers in behind','Retain and build patiently','Look for runner in behind','Direct counter-attack through runners','Controlled transition — keep shape','Switch play to exploit open spaces']},
};

const MESO_THEMES = ['Pre-Season Fitness','Technical Foundation','Pressing & Press-Resistance','Build-Up Play','Attacking Combinations','Defensive Organisation','Transition Play','Set Pieces','Individual Development','Match Preparation','Recovery & Reflection'];
const MESO_COLORS = {'Pre-Season Fitness':'#58a6ff','Technical Foundation':'#3fb950','Pressing & Press-Resistance':'#f85149','Build-Up Play':'#e3b341','Attacking Combinations':'#3fb950','Defensive Organisation':'#f85149','Transition Play':'#e3b341','Set Pieces':'#a78bfa','Individual Development':'#58a6ff','Match Preparation':'#e3b341','Recovery & Reflection':'#8b949e'};

const POS_CLR = {GK:'#e3b341',CB:'#58a6ff',LB:'#58a6ff',RB:'#58a6ff',LWB:'#58a6ff',RWB:'#58a6ff',DM:'#a78bfa',CM:'#a78bfa',AM:'#a78bfa',LM:'#a78bfa',RM:'#a78bfa',LW:'#3fb950',RW:'#3fb950',CF:'#f85149',ST:'#f85149'};

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function rclr(v,max=20) {
  const pct = v/max*100;
  return pct>=80?'#3fb950':pct>=60?'#e3b341':pct>=40?'#f0883e':'#f85149';
}
function avg20(obj) {
  const v = Object.values(obj||{}).filter(x=>typeof x==='number'&&x>0);
  return v.length ? Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10 : 0;
}
function initials(n) { return (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function aclr(n) { const c=['#3fb950','#58a6ff','#e3b341','#a78bfa','#f85149','#f0883e']; let h=0; for(let ch of (n||'')) h=(h*31+ch.charCodeAt(0))%c.length; return c[h]; }
function al(k) { return ATTR_LBL[k]||k.replace(/_/g,' '); }
function uid() { return Math.random().toString(36).slice(2); }

function ageMatch(sa, ta) {
  if (!sa||sa==='None'||sa==='null') return true;
  const pts = sa.split(',').map(a=>a.trim());
  return pts.some(a=>a===ta||ta.includes(a.split('-')[0])||a.includes(ta.split('-')[0]));
}

function scoreSession(s, gm, priorities, weakAttrs) {
  let sc = 0;
  weakAttrs.forEach(a=>{ if(s['tag_'+a]==='Y') sc+=4; });
  priorities.forEach(a=>{ if(s['tag_'+a]==='Y') sc+=2; });
  if((gm.P1||[]).length&&s.gm_phase1==='Y') sc+=3;
  if((gm.P2||[]).length&&s.gm_phase2==='Y') sc+=2;
  if((gm.P3||[]).length&&s.gm_phase3==='Y') sc+=3;
  if((gm.P4||[]).length&&s.gm_phase4==='Y') sc+=2;
  return sc;
}

function getForBlock(recs, key) {
  return recs.find(s=>{
    const c=(s.category||'').toLowerCase(), n=(s.practice_name||'').toLowerCase();
    if(key==='warm') return /warm.?up|warmup/.test(c)||/warm.?up/.test(n);
    if(key==='tech') return /technical|skill|rondo|passing|ball.?mastery/.test(c)&&!/warm/.test(c);
    if(key==='opp') return /opposed|position.specific/.test(c)||(/possession|rondo/.test(c)&&!/warm/.test(c));
    return /\d+v\d+|ssg|match/.test(c)||/\d+v\d+/.test(n);
  });
}

function getPitchPositions(formation, w, h) {
  const lines = formation.split('-').map(Number);
  const margin = 30, cx = w/2;
  const usableH = h - margin*2;
  // Use getFormationRoles for accurate labels — but it may not be defined yet at call time
  // so we inline the same logic here
  const allRoles = (()=>{
    const r = ['GK'];
    lines.forEach((cnt, li) => {
      if (li === 0) {
        if (cnt === 2) r.push('CB','CB');
        else if (cnt === 3) r.push('CB','CB','CB');
        else if (cnt === 4) r.push('LB','CB','CB','RB');
        else if (cnt === 5) r.push('LWB','CB','CB','CB','RWB');
        else for(let i=0;i<cnt;i++) r.push(i===0?'LB':i===cnt-1?'RB':'CB');
      } else if (li === lines.length-1) {
        if (cnt === 1) r.push('CF');
        else if (cnt === 2) r.push('ST','ST');
        else if (cnt === 3) r.push('LW','CF','RW');
        else if (cnt === 4) r.push('LW','CF','CF','RW');
        else for(let i=0;i<cnt;i++) r.push(i===0?'LW':i===cnt-1?'RW':'CF');
      } else {
        const midRoles = cnt===1?['DM']:cnt===2?['CM','CM']:cnt===3?['CM','CM','CM']:cnt===4?['LM','CM','CM','RM']:['LM','DM','CM','CM','RM'];
        r.push(...midRoles.slice(0,cnt));
      }
    });
    return r;
  })();
  let roleIdx = 0;
  const positions = [{id:'GK0',role:'GK',x:cx,y:h-margin-12}];
  roleIdx = 1;
  lines.forEach((cnt,li)=>{
    const y = h - margin - 60 - li*(usableH-65)/lines.length;
    for(let i=0;i<cnt;i++){
      const x = margin+(i+1)*(w-margin*2)/(cnt+1);
      positions.push({id:'L'+li+'P'+i, role: allRoles[roleIdx]||'CM', x, y});
      roleIdx++;
    }
  });
  return positions;
}

function newTeam(name='New Team') {
  return {
    id: uid(), name, ageGroup:'U15-U18', formation:'4-3-3',
    squad:[], assignments:{},
    gameModel:{P1:[],P2:[],P3:[],P4:[]},
    priorities:[], duration:75, squadSize:16,
    seasonPlan: buildDefaultSeason(),
    weakAttrs:[], analysed:false,
  };
}

function buildDefaultSeason() {
  const mesocycles = [];
  const themes = ['Technical Foundation','Pressing & Press-Resistance','Build-Up Play','Attacking Combinations','Defensive Organisation','Transition Play'];
  themes.forEach((theme,i)=>{
    const weeks = [];
    for(let w=0;w<4;w++) weeks.push({id:uid(),label:'Week '+(i*4+w+1),session1:null,session2:null,notes:''});
    mesocycles.push({id:uid(),theme,weeks,open:i===0});
  });
  return mesocycles;
}

function newPlayer(name='',pos='CM') {
  return {id:uid(),name,primaryPos:pos,secondaryPos:[],attributes:{},coachRatings:{},coachRatingCategories:buildCategorizedRatings('U15-U18',{}),selfRatings:{},selfRatingCategories:buildCategorizedRatings('U15-U18',{}),notes:'',wellbeing:{motivation:0,happiness:0},goals:{},snapshots:[],idpTargets:{},idpActions:'',idpReviewDate:''};
}
function fetchJson(url, options) {
  return fetch(url, options).then(async res => {
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch(e) {}
    if (!res.ok) throw new Error(data?.error || data?.message || text || `Request failed (${res.status})`);
    return data;
  });
}

    setTeams(prev=>prev.map(t=>t.id===resolvedActiveId?{...t,...updates}:t));
  }

  }

    const t = newTeam('Team '+(teams.length+1));

  }

  useEffect(() => {
    let active = true;
    fetchJson('/coachlab/api/load_player_data.php')
      .then(data => {
        if (!active) return;
        const loadedTeams = Array.isArray(data?.teams) && data.teams.length ? data.teams.map(normalizeTeam) : [newTeam('My Team')];
        setTeams(loadedTeams);
        setActiveTeamId(data?.activeTeamId || loadedTeams[0]?.id || null);
        setDataReady(true);
      })
      .catch(() => {
        if (!active) return;
        setTeams([newTeam('My Team')]);
        setActiveTeamId(null);
        setDataReady(true);
      });
    return ()=>{ active = false; };
  }, []);
  useEffect(() => {
    if (!dataReady) return;
    const payload = {teams, activeTeamId: resolvedActiveId || activeTeamId || teams[0]?.id || null};
    const timeout = setTimeout(() => {

        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload),
      })
        .then(()=>setDataStatus(''))
        .catch(err=>setDataStatus(err.message || 'Could not save player data.'));

    return ()=>clearTimeout(timeout);

  function loadCatalogue(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws,{header:1});
        const fields = raw[1];
        const sessions = raw.slice(2).map(row=>{
          const obj={};
          fields.forEach((f,i)=>{if(f) obj[f]=row[i]!=null?row[i]:null;});
          return obj;
        }).filter(s=>s.practice_name);
        setTimeout(()=>{setCatalogue(sessions);setCatLoaded(true);},0);
      } catch(err){alert('Error loading catalogue: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function importSquad(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result,{type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws,{header:1});
        let hRow=0;
        for(let i=0;i<Math.min(5,raw.length);i++){
          if(raw[i].some(c=>typeof c==='string'&&/name|player/i.test(c))){hRow=i;break;}
        }
        const hdrs = raw[hRow].map(h=>(h||'').toString().toLowerCase().trim());
        const players = raw.slice(hRow+1).map((row,idx)=>{
          const p={};
          hdrs.forEach((h,i)=>{if(h) p[h]=row[i];});
          const name = p.name||p.player||p['player name']||('Player '+(idx+1));
          const pos = ((p.position||p.pos||'CM')+'').toUpperCase();
          const attrs={};
          Object.values(ATTRS).flat().forEach(attr=>{
            const v=p[attr.replace(/_/g,' ')]||p[attr]||p[(ATTR_LBL[attr]||'').toLowerCase()];
            if(v!=null&&!isNaN(Number(v))) attrs[attr]=Math.min(20,Math.max(1,Math.round(Number(v)/5)));
          });
          return newPlayer(name,pos.split('/')[0].trim());
        }).filter(p=>p.name);
        setTimeout(()=>updateTeam({squad:players}),0);
      } catch(err){alert('Error importing: '+err.message);}
    };
    reader.readAsArrayBuffer(file);
  }

  function runAnalysis() {
    if(!team.squad.length) return;
    const all={};
    getAllAttrKeys(team.ageGroup).forEach(attr=>{
      const vals=team.squad.map(p=>p.coachRatings[attr]).filter(v=>typeof v==='number'&&v>0);

  }

  const recommendations = useMemo(()=>{
    if(!catLoaded||!catalogue.length) return [];
    const filtered=catalogue.filter(s=>ageMatch(s.age_suitability,team.ageGroup));
    const scored=filtered.map(s=>({...s,_score:scoreSession(s,team.gameModel,team.priorities,team.weakAttrs)}));
    scored.sort((a,b)=>b._score-a._score);
    return scored;
  },[catalogue,catLoaded,team.ageGroup,team.gameModel,team.priorities,team.weakAttrs]);

  const maxScore = useMemo(()=>recommendations.reduce((m,s)=>s._score>m?s._score:m,1),[recommendations]);

  const isU10 = team.ageGroup==='U7-U10';

    {id:'squad',label:'Squad'},
    {id:'formation',label:'Formation'},
    {id:'depth',label:'Depth Chart'},
    {id:'sessions',label:'Sessions'},
    {id:'season',label:'Season Plan'},
    {id:'gamemodel',label:'Game Model'},
    {id:'players',label:'Players'},
  ];

  if(!dataReady) return (
    <div className="shell">
      <div className="main" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'60vh'}}>
        <div className="card" style={{maxWidth:'420px',width:'100%'}}>

            <div style={{fontWeight:700,color:'var(--gb)',marginBottom:'.35rem'}}>Loading player data…</div>
            <div style={{fontSize:'.8rem',color:'var(--txt3)'}}>Reading teams and player records from the filesystem</div>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div className="shell">
      {dataStatus&&(
        <div style={{maxWidth:'1400px',width:'100%',margin:'0 auto',padding:'1rem 1.25rem 0'}}>
          <div style={{padding:'.7rem .9rem',borderRadius:'6px',fontSize:'.8rem',background:'rgba(218,54,51,.12)',border:'1px solid var(--red)',color:'var(--rb)'}}>
            {dataStatus}
          </div>
        </div>
      )}
      <div className="topbar">
        <div className="logo">
          <div className="logo-icon">⚽</div>
          <div className="logo-text">COACH<span>LAB</span></div>
        </div>
        <div className="nav">
          {TABS.map(t=><button key={t.id} className={'nbtn'+(tab===t.id?' on':'')} onClick={()=>setTab(t.id)}>{t.label}</button>)}
        </div>
        <div className="topbar-right">
          {catLoaded
            ?<span className="bdg bdg-g">📚 {catalogue.length.toLocaleString()}</span>
            :<button className="btn btn-s btn-sm" onClick={()=>catRef.current&&catRef.current.click()}>📂 Load Catalogue</button>}
          <input type="file" ref={catRef} accept=".xlsx" style={{display:'none'}} onChange={e=>{if(e.target.files[0])loadCatalogue(e.target.files[0]);}}/>
          <div style={{display:'flex',gap:'.3rem',alignItems:'center'}}>
            {teams.map(t=>(
              <button key={t.id} className={'team-pill'+(t.id===activeTeamId?' active':'')} onClick={()=>setActiveTeamId(t.id)}>
                {t.name}

            <button className="btn btn-s btn-sm" onClick={()=>setShowTeamManager(true)}>⚙</button>

      </div>

      <div className="main">
        {tab==='home'&&<HomeTab teams={teams} setActiveTeamId={setActiveTeamId} setTab={setTab} catalogue={catalogue}/>}
        {tab==='home'&&<HomeTab teams={teams} setActiveTeamId={setActiveTeamId} setTab={setTab} catalogue={catalogue}/>}
        {tab==='squad'&&<SquadTab team={team} updateTeam={updateTeam} importSquad={importSquad} runAnalysis={runAnalysis}/>}
        {tab==='formation'&&<FormationTab team={team} updateTeam={updateTeam} availFormations={availFormations}/>}
        {tab==='sessions'&&<SessionsTab recommendations={recommendations} maxScore={maxScore} catLoaded={catLoaded} team={team} runAnalysis={runAnalysis}/>}

// Map formation slots to position groups for matching
const POS_GROUPS_MAP = {
  GK:  ['GK'],
  CB:  ['CB'],
  LB:  ['LB','LWB'],  RB: ['RB','RWB'],
  LWB: ['LWB','LB'],  RWB: ['RWB','RB'],
  DM:  ['DM','CM'],
  CM:  ['CM','DM','AM'],
  AM:  ['AM','CM','LM','RM'],
  LM:  ['LM','LW','AM'],   RM: ['RM','RW','AM'],
  LW:  ['LW','LM','CF'],   RW: ['RW','RM','CF'],
  CF:  ['CF','ST','LW','RW'],
  ST:  ['ST','CF'],
};

// Game model -> formation affinity
const GM_FORMATION_BONUS = {
  'High press — win ball high':         {'4-3-3':3,'3-4-3':3,'4-2-3-1':2,'3-5-2':1},
  'Press immediately to win back':      {'4-3-3':2,'3-4-3':2,'4-2-3-1':2},
  'Use width to stretch':               {'4-3-3':3,'3-4-3':3,'4-1-4-1':2,'4-5-1':1},
  'Dominate possession':                {'4-3-3':2,'4-2-3-1':3,'3-5-2':2,'4-1-4-1':2},
  'Build from the back':                {'3-4-3':2,'3-5-2':3,'3-4-2-1':2,'4-3-3':1},
  'Overload central areas':             {'4-2-3-1':3,'4-3-2-1':3,'3-5-2':2,'4-1-3-2':2},
  'Low block — protect shape':          {'4-4-2':3,'4-5-1':3,'5-4-1':3,'5-3-2':2},
  'Mid-block — defend from midfield':   {'4-4-2':2,'4-1-4-1':3,'4-5-1':2,'5-3-2':2},
  'Attack quickly before opposition':   {'4-3-3':2,'4-4-2':2,'3-4-3':2},
  'Play direct to forwards quickly':    {'4-4-2':3,'5-3-2':2,'4-5-1':2},
  // 9v9 formations
  'High press — win ball high':         {'2-3-1-2':2,'3-2-3':3,'2-4-2':1},
  'Use width to stretch':               {'3-2-3':3,'2-4-2':2,'3-3-2':1},
  'Dominate possession':                {'2-4-2':3,'3-2-3':2},
  'Low block — protect shape':          {'3-3-2':2,'2-3-1-2':2},
};

function getBestPlayerForRole(role, squad, usedIds) {
  const eligible = squad
    .filter(p => !usedIds.has(p.id))
    .filter(p => {
      const allPos = [p.primaryPos, ...(p.secondaryPos||[])];
      const acceptedPos = POS_GROUPS_MAP[role] || [role];
      return allPos.some(ap => acceptedPos.includes(ap));
    })
    .sort((a,b) => {
      // Primary position players first, then by OVR
      const aIsPrimary = (POS_GROUPS_MAP[role]||[role]).includes(a.primaryPos);
      const bIsPrimary = (POS_GROUPS_MAP[role]||[role]).includes(b.primaryPos);
      if (aIsPrimary !== bIsPrimary) return aIsPrimary ? -1 : 1;
      return avg20(b.coachRatings) - avg20(a.coachRatings);
    });
  return eligible[0] || null;
}

function scoreFormation(formation, squad, gameModel) {
  const slotRoles = getFormationRoles(formation);
  const usedIds = new Set();
  let coverageScore = 0;
  let qualityTotal = 0;
  let qualityCount = 0;
  const assignments = {};
  const warnings = [];

  slotRoles.forEach((role, i) => {
    const player = getBestPlayerForRole(role, squad, usedIds);
    if (player) {
      usedIds.add(player.id);
      assignments[i] = player;
      coverageScore += 10;
      const ovr = avg20(player.coachRatings);
      if (ovr > 0) { qualityTotal += ovr; qualityCount++; }
      // Bonus if it is their primary position
      const isPrimary = (POS_GROUPS_MAP[role]||[role]).includes(player.primaryPos);
      if (isPrimary) coverageScore += 3;
    } else {
      warnings.push(role + ' uncovered');
      coverageScore -= 15;
    }
  });

  const qualityScore = qualityCount > 0 ? (qualityTotal / qualityCount) * 2 : 0;

  // Game model bonus
  let gmBonus = 0;
  const allPrinciples = Object.values(gameModel).flat();
  allPrinciples.forEach(principle => {
    const bonusMap = GM_FORMATION_BONUS[principle];
    if (bonusMap && bonusMap[formation]) gmBonus += bonusMap[formation];
  });

  // Strength alignment: check where the team is strongest
  const posStrengths = {};
  squad.forEach(p => {
    const ovr = avg20(p.coachRatings);
    if (ovr <= 0) return;
    const grp = /CB|LB|RB|LWB|RWB/.test(p.primaryPos) ? 'def'
               : /DM|CM|AM|LM|RM/.test(p.primaryPos) ? 'mid'
               : /LW|RW|CF|ST/.test(p.primaryPos) ? 'fwd' : 'gk';
    posStrengths[grp] = (posStrengths[grp] || []);
    posStrengths[grp].push(ovr);
  });
  const avgStr = grp => posStrengths[grp] ? posStrengths[grp].reduce((a,b)=>a+b,0)/posStrengths[grp].length : 0;
  const defStr = avgStr('def'), midStr = avgStr('mid'), fwdStr = avgStr('fwd');

  let alignBonus = 0;
  const lines = formation.split('-').map(Number);
  const numMids = lines.length > 2 ? lines.slice(1, -1).reduce((a,b)=>a+b,0) : lines[1]||0;
  const numDefs = lines[0] || 0;
  const numFwds = lines[lines.length-1] || 0;
  if (midStr >= defStr && midStr >= fwdStr && numMids >= 3) alignBonus += 4;
  if (fwdStr >= defStr && fwdStr >= midStr && numFwds >= 2) alignBonus += 3;
  if (defStr >= midStr && defStr >= fwdStr && numDefs >= 4) alignBonus += 2;

  const totalScore = coverageScore + qualityScore + gmBonus + alignBonus;

  return { formation, score: totalScore, coverageScore, qualityScore: Math.round(qualityScore*10)/10, gmBonus, alignBonus, assignments, warnings, usedIds };
}

function getFormationRoles(formation) {
  const lines = formation.split('-').map(Number);
  const roles = ['GK'];
  const roleTemplates = [
    ['CB','CB','CB','CB','CB'],
    ['DM','CM','CM','CM','CM','DM'],
    ['LM','CM','AM','AM','CM','RM'],
    ['LW','CF','ST','RW','CF'],
  ];
  lines.forEach((cnt, li) => {
    const template = roleTemplates[Math.min(li, roleTemplates.length-1)];
    if (li === 0) {
      // Defence line
      if (cnt === 2) roles.push('CB','CB');
      else if (cnt === 3) roles.push('CB','CB','CB');
      else if (cnt === 4) roles.push('LB','CB','CB','RB');
      else if (cnt === 5) roles.push('LWB','CB','CB','CB','RWB');
    } else if (li === lines.length-1) {
      // Attack line
      if (cnt === 1) roles.push('CF');
      else if (cnt === 2) roles.push('ST','ST');
      else if (cnt === 3) roles.push('LW','CF','RW');
      else if (cnt === 4) roles.push('LW','CF','CF','RW');
    } else {
      // Midfield lines
      const midRoles = cnt===1?['DM']:cnt===2?['CM','CM']:cnt===3?['CM','CM','CM']:cnt===4?['LM','CM','CM','RM']:['LM','DM','CM','CM','RM'];
      roles.push(...midRoles.slice(0,cnt));
    }
  });
  return roles;
}

function generateFormationInsight(result, squad, gameModel) {
  const lines = [];
  const allPrinciples = Object.values(gameModel).flat();

  if (result.warnings.length === 0) {
    lines.push('Full squad coverage — every position can be filled from primary or secondary roles.');
  } else {
    lines.push('Position gaps: ' + result.warnings.join(', ') + '. May require players out of position.');
  }

  if (result.gmBonus >= 4) {
    const matchedPrinciples = allPrinciples.filter(p => GM_FORMATION_BONUS[p]?.[result.formation] >= 2);
    if (matchedPrinciples.length) lines.push('Suits your game model: ' + matchedPrinciples.slice(0,2).join('; ') + '.');
  }

  if (result.alignBonus >= 3) {
    const fmLines = result.formation.split('-').map(Number);
    const numMids = fmLines.length > 2 ? fmLines.slice(1,-1).reduce((a,b)=>a+b,0) : fmLines[1]||0;
    const numFwds = fmLines[fmLines.length-1]||0;
    if (numMids >= 3) lines.push('Plays to your squad strength in midfield.');
    else if (numFwds >= 2) lines.push('Plays to your squad strength in attack.');
  }

  return lines;
}

function FormationTab({team,updateTeam,availFormations}) {

  useEffect(()=>{
    function m(){if(wrapRef.current){const w=wrapRef.current.offsetWidth;if(w>0)setPw(Math.min(w,460));}}
    m();window.addEventListener('resize',m);return()=>window.removeEventListener('resize',m);
  },[]);

  const positions=useMemo(()=>getPitchPositions(team.formation,pw,ph),[team.formation,pw,ph]);
  const assignments=team.assignments||{};

  function assignPlayer(posId,playerId){
    const next={...assignments};
    Object.keys(next).forEach(k=>{if(next[k]===playerId)delete next[k];});
    if(playerId)next[posId]=playerId;else delete next[posId];
    updateTeam({assignments:next});
  }

  const unassigned=team.squad.filter(p=>!Object.values(assignments).includes(p.id));

  // Recommendation engine
  const recommendations=useMemo(()=>{
    if(!team.squad.length) return [];
    const ranked=availFormations.map(f=>scoreFormation(f,team.squad,team.gameModel||{}));
    ranked.sort((a,b)=>b.score-a.score);
    return ranked;
  },[team.squad,availFormations,team.gameModel]);

    // Apply formation and auto-assign the recommended players
    const slots=getFormationRoles(result.formation);
    const newAssignments={};
    const pitchPos=getPitchPositions(result.formation,pw,ph);

      const role=slots[i];
      if(!role) return;
      const player=getBestPlayerForRole(role,team.squad,usedIds);
      if(player){newAssignments[pos.id]=player.id;usedIds.add(player.id);}
    });
    updateTeam({formation:result.formation,assignments:newAssignments});
    setMode('manual');
  }

  const maxScore=recommendations.reduce((m,r)=>r.score>m?r.score:m,1);

        <div>

            <div className="empty"><div className="empty-icon">👥</div><div className="empty-title">No players in squad</div><div style={{fontSize:'.77rem'}}>Add players in the Squad tab first, then rate them in the Players tab for stronger recommendations.</div></div>
          ):(

              <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
                {recommendations.map((result,i)=>{
                  const pct=Math.round(Math.max(0,result.score)/maxScore*100);
                  const isTop=i===0;
                  const insight=generateFormationInsight(result,team.squad,team.gameModel||{});
                  return(
                    <div key={result.formation} style={{background:isTop?'rgba(63,185,80,.06)':'var(--sur)',border:'1px solid '+(isTop?'var(--green)':'var(--bdr)'),borderRadius:'8px',overflow:'hidden'}}>
                      <div style={{padding:'.65rem 1rem',display:'flex',alignItems:'center',gap:'.65rem'}}>
                        <div style={{fontFamily:'Rajdhani',fontSize:'1.35rem',fontWeight:700,letterSpacing:'.04em',color:isTop?'var(--gb)':'var(--txt)',minWidth:'72px'}}>{result.formation}</div>
                        {isTop&&<span className="bdg bdg-g" style={{fontSize:'.66rem'}}>★ TOP PICK</span>}

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function TrainingProgram({recommendations,team,BLOCKS,maxScore,expanded,setExpanded}) {
  const WEEKS = 4;
  // Build a 4-week program: each week gets a full session plan
  // Cycle through top matches per block so each week gets a different session
  const program = useMemo(()=>{
    const weeks=[];
    for(let w=0;w<WEEKS;w++){
      const usedIds=new Set(weeks.flatMap(wk=>wk.map(s=>s?.practice_name+s?.source_book)));
      const weekSessions=BLOCKS.map(block=>{
        const candidates=recommendations.filter(s=>{
          const c=(s.category||'').toLowerCase(), n=(s.practice_name||'').toLowerCase();
          const key=s.practice_name+''+s.source_book;
          if(usedIds.has(key)) return false;
          if(block.key==='warm') return /warm.?up|warmup/.test(c)||/warm.?up/.test(n);
          if(block.key==='tech') return /technical|skill|rondo|passing|ball.?mastery/.test(c)&&!/warm/.test(c);
          if(block.key==='opp') return /opposed|position.specific/.test(c)||(/possession|rondo/.test(c)&&!/warm/.test(c));
          return /\d+v\d+|ssg|match/.test(c)||/\d+v\d+/.test(n);
        });
        const pick=candidates[w]||candidates[0]||null;
        if(pick) usedIds.add(pick.practice_name+''+pick.source_book);
        return pick;
      });
      weeks.push(weekSessions);
    }
    return weeks;
  },[recommendations,BLOCKS]);

  return(
    <div>
      <div style={{display:'flex',alignItems:'center',gap:'.55rem',padding:'.5rem .85rem',background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:'7px',marginBottom:'.85rem'}}>
        <span style={{fontFamily:'Rajdhani',fontSize:'.92rem',fontWeight:700}}>{team.name}</span>
        <span className="bdg bdg-grey">{team.ageGroup}</span>
        <span className="bdg bdg-b">4-Week Block</span>
        {team.weakAttrs.length>0&&team.weakAttrs.slice(0,3).map(a=><span key={a} className="bdg bdg-r" style={{fontSize:'.62rem'}}>{a.replace(/_/g,' ')}</span>)}
        <span style={{fontSize:'.73rem',color:'var(--txt3)',marginLeft:'auto'}}>Targeting squad weaknesses — rotates sessions each week</span>
      </div>
      {program.map((weekSessions,wi)=>(
        <div key={wi} style={{marginBottom:'1rem'}}>
          <div style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:'.95rem',letterSpacing:'.05em',color:'var(--gb)',marginBottom:'.45rem',paddingBottom:'.3rem',borderBottom:'1px solid var(--bdr)'}}>
            WEEK {wi+1}
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:'.45rem'}}>
            {BLOCKS.map((block,bi)=>{
              const s=weekSessions[bi];
              if(!s) return null;
              const key='w'+wi+'b'+bi+s.practice_name;
              return(
                <div key={key} className="card">
                  <div style={{padding:'.4rem .85rem',background:'var(--sur2)',borderBottom:'1px solid var(--bdr)',display:'flex',alignItems:'center',gap:'.45rem'}}>
                    <span>{block.icon}</span>
                    <span style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:'.8rem',letterSpacing:'.05em',color:block.color}}>{block.label.toUpperCase()}</span>
                    <span className="bdg bdg-grey" style={{marginLeft:'auto'}}>{block.mins} mins</span>
                  </div>
                  <div style={{padding:'.55rem .85rem'}}>
                    <SessionCard s={s} maxScore={maxScore} expanded={expanded===key} onToggle={()=>setExpanded(expanded===key?null:key)}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

function SessionCard({s,maxScore,expanded,onToggle}) {

  if(s.gm_phase1==='Y') phases.push({l:'P1',c:'#3fb950'});
  if(s.gm_phase2==='Y') phases.push({l:'P2',c:'#e3b341'});
  if(s.gm_phase3==='Y') phases.push({l:'P3',c:'#f85149'});
  if(s.gm_phase4==='Y') phases.push({l:'P4',c:'#58a6ff'});
  const tags=Object.keys(s).filter(k=>k.startsWith('tag_')&&s[k]==='Y').map(k=>k.slice(4)).slice(0,5);
  return(
    <div className={'scard'+(expanded?' exp':'')} onClick={onToggle}>
      <div className="sname">{s.practice_name||'Unnamed'}</div>
      <div className="smeta">
        {s.source_book&&<span className="bdg bdg-grey" style={{fontSize:'.63rem'}}>{s.source_book}</span>}

        {s.area_dimensions&&<span className="bdg bdg-grey">📐 {s.area_dimensions}</span>}
        {phases.map(p=><span key={p.l} style={{fontSize:'.66rem',fontWeight:700,padding:'.12rem .4rem',borderRadius:'3px',border:'1px solid '+p.c+'44',background:p.c+'0f',color:p.c}}>{p.l}</span>)}
      </div>
      {tags.length>0&&<div className="stags">{tags.map(t=><span key={t} className="chip">{al(t)}</span>)}</div>}
      {score>0&&<div className="sbar"><div className="sbar-fill" style={{width:pct+'%'}}/></div>}
      {expanded&&(
        <div className="sdesc">

            {s.practice_number&&<span style={{fontSize:'.72rem',color:'var(--txt3)'}}>· Practice #{s.practice_number}</span>}
            {s.category&&<span className="bdg bdg-grey" style={{marginLeft:'auto',fontSize:'.62rem'}}>{s.category}</span>}
          </div>
          {s.description&&<div style={{marginBottom:'.5rem'}}><div style={{fontSize:'.67rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.22rem'}}>Description</div><div>{s.description+''}</div></div>}
          {s.coaching_points&&<div><div style={{fontSize:'.67rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.22rem'}}>Coaching Points</div>{(s.coaching_points+'').split('|').filter(cp=>cp.trim()).map((cp,i)=><div key={i} style={{marginBottom:'.16rem'}}>• {cp.trim()}</div>)}</div>}
          {s.progressions&&<div style={{marginTop:'.42rem',padding:'.42rem',background:'var(--sur3)',borderRadius:'4px'}}><div style={{fontSize:'.67rem',fontWeight:700,color:'var(--gb)',marginBottom:'.16rem'}}>📈 Progressions</div><div style={{color:'var(--txt2)'}}>{s.progressions}</div></div>}
        </div>
      )}
    </div>
  );

function SeasonTab({team,updateTeam,recommendations,catLoaded}) {
  const [editSlot,setEditSlot]=useState(null);
  const [addingMeso,setAddingMeso]=useState(false);
  const [newTheme,setNewTheme]=useState(MESO_THEMES[0]);

  const plan=team.seasonPlan||[];

  function toggleMeso(id){
    updateTeam({seasonPlan:plan.map(m=>m.id===id?{...m,open:!m.open}:m)});
  }
  function updateMesoTheme(id,theme){
    updateTeam({seasonPlan:plan.map(m=>m.id===id?{...m,theme}:m)});
  }
  function deleteMeso(id){
    updateTeam({seasonPlan:plan.filter(m=>m.id!==id)});
  }
  function addMeso(){
    const weeks=[];
    const startW=plan.reduce((s,m)=>s+m.weeks.length,0);
    for(let w=0;w<4;w++) weeks.push({id:uid(),label:'Week '+(startW+w+1),session1:null,session2:null,notes:''});
    updateTeam({seasonPlan:[...plan,{id:uid(),theme:newTheme,weeks,open:true}]});
    setAddingMeso(false);
  }
  function setSlotSession(mesoId,weekId,slot,session){
    updateTeam({seasonPlan:plan.map(m=>m.id!==mesoId?m:{...m,weeks:m.weeks.map(w=>w.id!==weekId?w:{...w,[slot]:session})})});
    setEditSlot(null);
  }
  function updateWeekNotes(mesoId,weekId,notes){
    updateTeam({seasonPlan:plan.map(m=>m.id!==mesoId?m:{...m,weeks:m.weeks.map(w=>w.id!==weekId?w:{...w,notes})})});
  }

  const totalWeeks=plan.reduce((s,m)=>s+m.weeks.length,0);
  const plannedSessions=plan.reduce((s,m)=>s+m.weeks.reduce((ws,w)=>ws+(w.session1?1:0)+(w.session2?1:0),0),0);

  return(
    <div>

          <p style={{color:'var(--txt2)',fontSize:'.81rem'}}>Plan your season in mesocycles — themed blocks of 3–6 weeks. Each week supports 2 session slots.</p>

          <span className="bdg bdg-grey">{totalWeeks} weeks</span>
          <span className="bdg bdg-g">{plannedSessions} sessions planned</span>

        </div>
      </div>

      {addingMeso&&(
        <div className="card" style={{marginBottom:'1rem'}}>
          <div className="ch"><span className="ct">New Training Block</span></div>
          <div className="cb">
            <div className="frow">
              <div className="fgrp">

function SessionPickerModal({recommendations,catLoaded,onPick,onClose}) {
  const [q,setQ]=useState('');
  const [catF,setCatF]=useState('all');
  const filtered=useMemo(()=>{
    let s=catLoaded?recommendations.filter(s=>s._score>=0):[];
    if(q) s=s.filter(s=>(s.practice_name||'').toLowerCase().includes(q.toLowerCase()));
    if(catF==='warm') s=s.filter(s=>/warm.?up|warmup/.test((s.category||'').toLowerCase()));
    else if(catF==='tech') s=s.filter(s=>/technical|skill|rondo|passing/.test((s.category||'').toLowerCase()));
    else if(catF==='opp') s=s.filter(s=>/opposed|position.specific/.test((s.category||'').toLowerCase()));
    else if(catF==='ssg') s=s.filter(s=>/\d+v\d+|ssg|match/.test((s.category||'').toLowerCase()));
    return s.slice(0,40);
  },[recommendations,catLoaded,q,catF]);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <span style={{fontFamily:'Rajdhani',fontSize:'1.05rem',fontWeight:700}}>Pick a Session</span>
          <button className="btn btn-g btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{padding:'1rem'}}>
          <input className="inp" placeholder="Search sessions..." value={q} onChange={e=>setQ(e.target.value)} style={{marginBottom:'.6rem'}}/>
          <div style={{display:'flex',gap:'.3rem',flexWrap:'wrap',marginBottom:'.75rem'}}>
            {[['all','All'],['warm','🔥 Warm'],['tech','⚽ Tech'],['opp','🔴 Opposed'],['ssg','🏟️ SSG']].map(([id,lbl])=>(
              <button key={id} className={'btn btn-xs '+(catF===id?'btn-p':'btn-s')} onClick={()=>setCatF(id)}>{lbl}</button>
            ))}
          </div>
          {!catLoaded&&<div className="alert-i" style={{marginBottom:'.75rem'}}>Load the catalogue first to search sessions</div>}
          <div className="scroll" style={{maxHeight:'380px'}}>
            {filtered.map(s=>(
              <div key={s.practice_name+s.source_book} style={{padding:'.55rem .75rem',borderBottom:'1px solid var(--bdr2)',cursor:'pointer',transition:'background .1s'}} onClick={()=>onPick(s)} onMouseEnter={e=>e.currentTarget.style.background='var(--sur2)'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <div style={{fontFamily:'Rajdhani',fontSize:'.88rem',fontWeight:700}}>{s.practice_name}</div>
                <div style={{display:'flex',gap:'.3rem',marginTop:'.2rem'}}>
                  {s.source_book&&<span className="bdg bdg-grey" style={{fontSize:'.62rem'}}>{s.source_book}</span>}
                  {s.players_ideal&&<span className="bdg bdg-b" style={{fontSize:'.62rem'}}>👥 {s.players_ideal}</span>}
                  {s.duration_mins&&<span className="bdg bdg-grey" style={{fontSize:'.62rem'}}>⏱ {s.duration_mins}m</span>}
                </div>
              </div>
            ))}
            {filtered.length===0&&<div style={{padding:'1.5rem',textAlign:'center',color:'var(--txt3)',fontSize:'.8rem'}}>No sessions found</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function saveSnapshot(player, updatePlayer) {
  const snap = {
    date: new Date().toISOString().slice(0,10),
    ratings: {...player.coachRatings},
    categories: buildCategorizedRatings(player.ageGroup, player.coachRatings),
    ovr: avg20(player.coachRatings),
  };
  const existing = player.snapshots||[];
  // Replace if same date already exists
  const filtered = existing.filter(s=>s.date!==snap.date);
  updatePlayer({snapshots:[...filtered,snap]});
  return {
    snapshot: snap,
    message: existing.some(s=>s.date===snap.date) ? 'Snapshot updated for today' : 'Snapshot saved',
  };
}

function PlayersTab({team,updateTeam}) {
  const [activeId,setActiveId]=useState(null);
  const [mode,setMode]=useState('coach');
  const [reportPlayer,setReportPlayer]=useState(null);
  const [eliteMatchPlayer,setEliteMatchPlayer]=useState(null);
  const [importMsg,setImportMsg]=useState(null);
  const importRef=useRef();

  const pid=activeId||(team.squad[0]?.id||null);
  const player=team.squad.find(p=>p.id===pid)||null;

  function updatePlayer(updates){
    updateTeam({squad:team.squad.map(p=>{
      if (p.id!==pid) return p;
      const next = {...p,...updates};
      const coachRatings = next.coachRatings || {};
      const selfRatings = next.selfRatings || {};
      return {
        ...next,
        coachRatingCategories: buildCategorizedRatings(team.ageGroup, coachRatings),
        selfRatingCategories: buildCategorizedRatings(team.ageGroup, selfRatings),
      };
    })});
  }

  function importReflection(file){
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(data._type!=='frp_self_reflection'){setImportMsg({ok:false,msg:'This does not look like a valid player reflection file.'});return;}
        // Match by name (case-insensitive, trimmed)
        const match=team.squad.find(p=>p.name.trim().toLowerCase()===data.playerName.trim().toLowerCase());
        if(!match){
          setImportMsg({ok:false,msg:`No player named "${data.playerName}" found in this squad. Check the name matches exactly.`});
          return;
        }
        const selfRatings={...match.selfRatings,...(data.selfRatings||{})};
        const updates={
          selfRatings,
          selfRatingCategories: buildCategorizedRatings(team.ageGroup, selfRatings),
          goals:{...match.goals,...(data.goals||{})},
          wellbeing:{...match.wellbeing,...(data.wellbeing||{})},
        };
        updateTeam({squad:team.squad.map(p=>p.id===match.id?{...p,...updates}:p)});
        setActiveId(match.id);
        setMode('self');
        setImportMsg({ok:true,msg:`✓ Reflection imported for ${data.playerName}${data.reflectionDate?' ('+data.reflectionDate+')':''}`});
        setTimeout(()=>setImportMsg(null),5000);
      }catch(err){setImportMsg({ok:false,msg:'Could not read file: '+err.message});}
    };
    reader.readAsText(file);
    if(importRef.current) importRef.current.value='';
  }
  function setRating(attr,val){
    if(mode==='coach') updatePlayer({coachRatings:{...player.coachRatings,[attr]:val}});
    else updatePlayer({selfRatings:{...player.selfRatings,[attr]:val}});
  }
  function toggleSecondaryPos(pos){
    const cur=player.secondaryPos||[];
    const next=cur.includes(pos)?cur.filter(p=>p!==pos):[...cur,pos];
    updatePlayer({secondaryPos:next});
  }
  async function persistSnapshotToFile(snapshot){
    const res = await fetch('/coachlab/api/save_snapshot.php', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(buildSnapshotPayload(player, team, snapshot)),
    });
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch(e) {}
    if (!res.ok) {
      throw new Error(data?.error || data?.message || text || `Snapshot save failed (${res.status})`);
    }
    return data || {ok:true};
  }

  if(!team.squad.length) return(
    <div className="empty" style={{paddingTop:'4rem'}}>
      <div className="empty-icon">👤</div><div className="empty-title">No Players</div>
      <div style={{fontSize:'.77rem'}}>Add players in the Squad tab first</div>
    </div>
  );

  const inner=(
    <div style={{display:'flex',gap:'1rem',alignItems:'start'}}>
      <div style={{width:'195px',flexShrink:0}}>
        <div className="card">
          <div className="ch"><span className="ct">Players</span></div>
          <div className="scroll" style={{maxHeight:'600px'}}>
            {team.squad.map(p=>{
              const ovr=avg20(p.coachRatings);
              const col=aclr(p.name);
              return(
                <div key={p.id} className={'prow'+(pid===p.id?' active':'')} onClick={()=>setActiveId(p.id)}>
                  <div className="pavatar" style={{background:col+'22',color:col,width:'26px',height:'26px',fontSize:'.68rem'}}>{initials(p.name)}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:'.8rem',fontWeight:600}}>{p.name}</div>
                    <div style={{fontSize:'.69rem',color:'var(--txt3)'}}>{p.primaryPos}</div>
                  </div>
                  {ovr>0&&<div style={{fontFamily:'Rajdhani',fontSize:'.8rem',fontWeight:700,color:rclr(ovr)}}>{ovr.toFixed(1)}</div>}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {player&&(
        <div style={{flex:1}}>
          <div className="card" style={{marginBottom:'1rem'}}>
            <div style={{padding:'1rem',background:'var(--sur2)',display:'flex',gap:'.9rem',alignItems:'center'}}>
              <div style={{width:46,height:46,borderRadius:'50%',background:aclr(player.name)+'33',color:aclr(player.name),display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Rajdhani',fontSize:'1.2rem',fontWeight:700}}>
                {initials(player.name)}
              </div>
              <div style={{flex:1}}>
                <input className="inp" value={player.name} onChange={e=>updatePlayer({name:e.target.value})} style={{background:'transparent',border:'none',padding:0,fontFamily:'Rajdhani',fontSize:'1.2rem',fontWeight:700,letterSpacing:'.04em',width:'100%'}}/>
                <div style={{fontSize:'.77rem',color:'var(--txt2)',marginTop:'.15rem'}}>{team.ageGroup}</div>
              </div>
              {avg20(player.coachRatings)>0&&(

                {player.goals.season&&<div style={{marginBottom:'.65rem'}}><div style={{fontSize:'.71rem',fontWeight:700,color:'var(--bb)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.25rem'}}>Season Goal</div><div style={{fontSize:'.82rem',color:'var(--txt2)',lineHeight:1.5}}>{player.goals.season}</div></div>}
                {player.goals.personal&&<div><div style={{fontSize:'.71rem',fontWeight:700,color:'var(--pb)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.25rem'}}>Personal Notes</div><div style={{fontSize:'.82rem',color:'var(--txt2)',lineHeight:1.5}}>{player.goals.personal}</div></div>}
              </div>
            </div>
          )}

          {mode==='coach'&&(player.snapshots||[]).length>0&&(
            <div className="card" style={{marginTop:'1rem'}}>
              <div className="ch"><span className="ct">📈 Progress History</span><span style={{fontSize:'.74rem',color:'var(--txt3)',marginLeft:'auto'}}>{player.snapshots.length} snapshot{player.snapshots.length!==1?'s':''}</span></div>
              <div className="cb">
                <ProgressChart snapshots={player.snapshots} ageGroup={team.ageGroup}/>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
  return (
    <div>
      {inner}
      {reportPlayer&&<PlayerReportModal player={reportPlayer} team={team} onClose={()=>setReportPlayer(null)}/>}
      {eliteMatchPlayer&&<ElitePlayerMatchModal player={eliteMatchPlayer} team={team} onClose={()=>setEliteMatchPlayer(null)}/>}
    </div>
  );
}

// ── PROGRESS CHART ────────────────────────────────────────────────────────────

function ProgressChart({snapshots,ageGroup}) {
  const sorted=[...snapshots].sort((a,b)=>a.date.localeCompare(b.date));
  const max=20;
  const h=80, w=320;
  const pts=sorted.map((s,i)=>({
    x:sorted.length<2?w/2:i*(w-20)/(sorted.length-1)+10,
    y:h-10-(s.ovr/max*(h-20)),
    ovr:s.ovr, date:s.date
  }));
  const pathD=pts.map((p,i)=>(i===0?'M':'L')+p.x+','+p.y).join(' ');
  // Category trends
  const cats=Object.entries(getAttrs(ageGroup));
  return(
    <div>
      <div style={{display:'flex',gap:'1.5rem',marginBottom:'1rem',flexWrap:'wrap'}}>
        {sorted.map(s=>(
          <div key={s.date} style={{textAlign:'center'}}>
            <div style={{fontFamily:'Rajdhani',fontSize:'1.4rem',fontWeight:700,color:rclr(s.ovr),lineHeight:1}}>{s.ovr.toFixed(1)}</div>
            <div style={{fontSize:'.67rem',color:'var(--txt3)',marginTop:'.12rem'}}>{s.date}</div>
          </div>
        ))}
      </div>
      {pts.length>1&&(
        <svg width="100%" viewBox={'0 0 '+w+' '+h} style={{display:'block',marginBottom:'1rem'}}>
          <path d={pathD} fill="none" stroke="var(--gb)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="4" fill="var(--gb)" stroke="var(--sur2)" strokeWidth="1.5"/>
              <text x={p.x} y={p.y-8} textAnchor="middle" fill="var(--gb)" fontSize="9" fontFamily="Rajdhani" fontWeight="700">{p.ovr.toFixed(1)}</text>
            </g>
          ))}
        </svg>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:'.45rem'}}>
        {cats.map(([grp,attrs])=>{
          const vals=sorted.map(s=>({
            date:s.date,
            avg:attrs.length>0?Math.round(attrs.map(a=>s.ratings[a]||0).filter(v=>v>0).reduce((a,b)=>a+b,0)/attrs.filter(a=>s.ratings[a]>0).length*10)/10||0:0
          }));
          const latest=vals[vals.length-1]?.avg||0;
          const prev=vals[vals.length-2]?.avg||0;
          const delta=vals.length>1?Math.round((latest-prev)*10)/10:null;
          return(
            <div key={grp} style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
              <div style={{width:'90px',fontSize:'.72rem',color:'var(--txt3)',flexShrink:0}}>{grpLabel(grp)}</div>
              <div className="rbar-track" style={{flex:1}}><div className="rbar-fill" style={{width:(latest/20*100)+'%',background:rclr(latest)}}/></div>
              <div style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:'.82rem',color:rclr(latest),width:'2.2rem',textAlign:'right'}}>{latest||'—'}</div>
              {delta!==null&&<div style={{fontSize:'.68rem',fontWeight:700,width:'2.5rem',color:delta>0?'var(--gb)':delta<0?'var(--rb)':'var(--txt3)'}}>{delta>0?'+':''}{delta}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

    const rows=Object.entries(ageAttrs).map(([grp,attrs])=>{

function ElitePlayerMatchModal({player,team,onClose}) {
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState('');
  const [result,setResult]=useState(null);

  useEffect(()=>{
    let active = true;
    async function run() {
      setLoading(true);
      setError('');
      try {
        const res = await fetch('/coachlab/api/match_elite_players.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(buildEliteMatchPayload(player, team)),
        });
        const data = await res.json().catch(() => null);
        if (!res.ok) {
          const msg = data?.error || data?.message || `Request failed (${res.status})`;
          throw new Error(msg);
        }
        if (active) setResult(data);
      } catch (err) {
        if (active) setError(err.message || 'Could not match elite players right now.');
      } finally {
        if (active) setLoading(false);
      }
    }
    run();
    return ()=>{ active = false; };
  }, [player, team]);

  const matches = Array.isArray(result) ? result : (result?.matches || []);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:'760px'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <div>
            <div className="ct">⭐ Match Elite Players</div>
            <div style={{fontSize:'.75rem',color:'var(--txt3)',marginTop:'.18rem'}}>
              {player.name} · {player.primaryPos} · {team.ageGroup}
            </div>
          </div>
          <button className="btn btn-g btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="cb" style={{display:'flex',flexDirection:'column',gap:'1rem'}}>
          <div style={{fontSize:'.78rem',color:'var(--txt2)',lineHeight:1.55}}>
            Sends the current player JSON to <code>/coachlab/api/match_elite_players.php</code> and expects a JSON response we can expand later.
          </div>

          {loading&&(
            <div className="card">
              <div className="cb" style={{textAlign:'center',padding:'1.8rem'}}>
                <div style={{fontWeight:700,color:'var(--gb)',marginBottom:'.3rem'}}>Finding comparable elite players…</div>
                <div style={{fontSize:'.78rem',color:'var(--txt3)'}}>Analysing coach ratings and profile data</div>
              </div>
            </div>
          )}

          {!loading&&error&&(
            <div style={{padding:'.75rem .9rem',borderRadius:'6px',fontSize:'.8rem',background:'rgba(218,54,51,.12)',border:'1px solid var(--red)',color:'var(--rb)'}}>
              {error}
            </div>
          )}

          {!loading&&!error&&result&&(
            <div style={{display:'flex',flexDirection:'column',gap:'.9rem'}}>
              {result.summary&&(
                <div className="card" style={{borderLeft:'3px solid var(--bb)'}}>
                  <div className="ch"><span className="ct">Summary</span></div>
                  <div className="cb" style={{fontSize:'.82rem',color:'var(--txt2)',lineHeight:1.6}}>
                    {result.summary}
                  </div>
                </div>
              )}

              {matches.length>0&&(
                <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>
                  {matches.map((match,i)=>(
                    <div key={match.name||i} className="card" style={{borderLeft:'3px solid var(--gb)'}}>
                      <div className="ch" style={{justifyContent:'space-between'}}>
                        <div style={{display:'flex',alignItems:'center',gap:'.5rem',flexWrap:'wrap'}}>
                          <span className="ct">{match.name||`Match ${i+1}`}</span>
                          {match.era&&<span className="bdg bdg-b">{match.era}</span>}
                          {match.position&&<span className="bdg bdg-grey">{match.position}</span>}
                        </div>
                        {match.matchScore!=null&&<span className="bdg bdg-g">Match {match.matchScore}</span>}
                      </div>
                      <div className="cb" style={{display:'flex',flexDirection:'column',gap:'.65rem'}}>
                        {match.why&&<div style={{fontSize:'.81rem',color:'var(--txt2)',lineHeight:1.55}}>{match.why}</div>}
                        {match.comparison&&<div style={{fontSize:'.79rem',color:'var(--txt2)',lineHeight:1.5}}><strong style={{color:'var(--txt)'}}>Comparison:</strong> {match.comparison}</div>}
                        {Array.isArray(match.shared_traits)&&match.shared_traits.length>0&&(
                          <div>
                            <div style={{fontSize:'.68rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.35rem'}}>Shared Traits</div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
                              {match.shared_traits.map((trait,idx)=><span key={idx} className="bdg bdg-g">{trait}</span>)}
                            </div>
                          </div>
                        )}
                        {Array.isArray(match.watch_for)&&match.watch_for.length>0&&(
                          <div>
                            <div style={{fontSize:'.68rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.35rem'}}>Watch For</div>
                            <ul style={{paddingLeft:'1rem',margin:0,color:'var(--txt2)',fontSize:'.79rem'}}>
                              {match.watch_for.map((item,idx)=><li key={idx} style={{marginBottom:'.3rem'}}>{item}</li>)}
                            </ul>
                          </div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}

              <div className="card">
                <div className="ch"><span className="ct">Raw Response</span></div>
                <div className="cb">
                  <pre style={{margin:0,whiteSpace:'pre-wrap',wordBreak:'break-word',fontSize:'.74rem',color:'var(--txt2)',fontFamily:'monospace'}}>
{JSON.stringify(result,null,2)}
                  </pre>
                </div>
              </div>

              {matches.length===0&&(
                <div className="card">
                  <div className="cb" style={{fontSize:'.8rem',color:'var(--txt2)'}}>
                    No structured `matches` array came back, so the raw JSON is shown below for now.
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DepthChartTab({team}) {
  const POS_GROUPS=[
    {label:'Goalkeeper',pos:['GK'],color:'#e3b341'},
    {label:'Centre Back',pos:['CB'],color:'#58a6ff'},
    {label:'Full Back',pos:['LB','RB','LWB','RWB'],color:'#58a6ff'},
    {label:'Def. Mid',pos:['DM'],color:'#a78bfa'},
    {label:'Centre Mid',pos:['CM'],color:'#a78bfa'},
    {label:'Att. Mid',pos:['AM','LM','RM'],color:'#a78bfa'},
    {label:'Wide',pos:['LW','RW'],color:'#3fb950'},
    {label:'Striker',pos:['CF','ST'],color:'#f85149'},
  ];

  function getPlayers(positions) {
    return team.squad.filter(p=>{
      const all=[p.primaryPos,...(p.secondaryPos||[])];
      return all.some(pp=>positions.includes(pp));
    });
  }

  const total=team.squad.length;

  return(
    <div>
      <h2 style={{fontSize:'1.35rem',fontWeight:700,marginBottom:'.18rem'}}>Squad Depth Chart</h2>
      <p style={{color:'var(--txt2)',fontSize:'.81rem',marginBottom:'1rem'}}>Coverage across all positions including secondary roles. Red = thin coverage.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:'.75rem'}}>
        {POS_GROUPS.map(grp=>{
          const players=getPlayers(grp.pos);
          const primary=players.filter(p=>grp.pos.includes(p.primaryPos));
          const secondary=players.filter(p=>!grp.pos.includes(p.primaryPos));
          const coverage=players.length===0?'none':players.length===1?'thin':players.length<=3?'ok':'strong';
          const coverClr={none:'var(--rb)',thin:'var(--ob)',ok:'var(--gb)',strong:'var(--gb)'};
          const coverBg={none:'rgba(218,54,51,.1)',thin:'rgba(210,153,34,.08)',ok:'rgba(46,160,67,.06)',strong:'rgba(46,160,67,.06)'};
          return(
            <div key={grp.label} style={{background:coverBg[coverage],border:'1px solid '+(coverage==='none'?'var(--red)':coverage==='thin'?'var(--org)':'var(--bdr)'),borderRadius:'8px',padding:'.8rem'}}>
              <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginBottom:'.55rem'}}>
                <span style={{fontFamily:'Rajdhani',fontSize:'.82rem',fontWeight:700,color:grp.color}}>{grp.label}</span>
                <div style={{display:'flex',gap:'.2rem',marginLeft:'auto'}}>
                  {grp.pos.map(p=><span key={p} style={{fontSize:'.65rem',padding:'.08rem .3rem',borderRadius:'3px',background:grp.color+'22',color:grp.color,fontWeight:700,fontFamily:'Rajdhani'}}>{p}</span>)}
                </div>
                <span style={{fontFamily:'Rajdhani',fontWeight:700,fontSize:'.85rem',color:coverClr[coverage]}}>{players.length}</span>
              </div>
              {players.length===0?(
                <div style={{fontSize:'.74rem',color:'var(--rb)',fontStyle:'italic'}}>No coverage — consider signing or retraining</div>
              ):(
                <div>
                  {primary.map(p=>(
                    <div key={p.id} style={{display:'flex',alignItems:'center',gap:'.4rem',marginBottom:'.25rem'}}>
                      <div style={{width:6,height:6,borderRadius:'50%',background:grp.color,flexShrink:0}}/>
                      <span style={{fontSize:'.78rem',fontWeight:600}}>{p.name}</span>
                      <span style={{fontSize:'.68rem',color:'var(--txt3)',marginLeft:'auto'}}>{p.primaryPos}</span>
                      {avg20(p.coachRatings)>0&&<span style={{fontFamily:'Rajdhani',fontSize:'.76rem',fontWeight:700,color:rclr(avg20(p.coachRatings))}}>{avg20(p.coachRatings).toFixed(1)}</span>}
                    </div>
                  ))}

// EXPORT / IMPORT DATA

function exportAllData(teams) {
  const payload={_type:'coachlab_backup',_version:'1.0',_exported:new Date().toISOString(),teams};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`coachlab_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importAllData(file,teams,setTeams,setActiveTeamId,onDone) {
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data._type!=='coachlab_backup'){onDone({ok:false,msg:'Not a valid Coachlab backup file.'});return;}
      const importedTeams=(data.teams||[]).map(normalizeTeam);
      const merged=[...teams];
      importedTeams.forEach(it=>{
        const idx=merged.findIndex(t=>t.id===it.id);
        if(idx>=0)merged[idx]=it;else merged.push(it);
      });
      setTeams(merged);
      if(merged.length)setActiveTeamId(merged[0].id);
      onDone({ok:true,msg:`Imported ${importedTeams.length} team${importedTeams.length!==1?'s':''}. Existing data preserved.`});
    }catch(err){onDone({ok:false,msg:'Could not read file: '+err.message});}
  };
  reader.readAsText(file);
}

  const activeTargets=attrList.filter(({key})=>targets[key]>0);
  return(
    <div className="card" style={{marginTop:'1rem'}}>
      <div className="ch" style={{cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>

            <div style={{flex:1,minWidth:'160px'}}>
              <label className="lbl">Review Date</label>
              <input type="date" className="inp" value={player.idpReviewDate||''} onChange={e=>updatePlayer({idpReviewDate:e.target.value})}/>
            </div>
          </div>
          {Object.entries(attrs).map(([grp,keys])=>(
            <div key={grp} className="agrp">
              <div className="agrp-lbl">{grpLabel(grp)}</div>
              {keys.map(attr=>{
                const current=player.coachRatings[attr]||0;

                  <div key={attr} style={{marginBottom:'.65rem'}}>

                      {gap!==null&&<span style={{fontSize:'.68rem',fontWeight:700,minWidth:'2.2rem',textAlign:'right',color:gap>0?'var(--ob)':gap===0?'var(--gb)':'var(--rb)'}}>{gap>0?'+':''}{gap}</span>}

function buildSessionBriefHTML(team, blocks, sessions) {
  const dur = team.duration||75;

  const totalMins = blockTimes.reduce((a,b)=>a+b,0);
  const timelineHTML = blocks.map((b,i)=>`<div style="flex:${blockTimes[i]};background:${blockColors[b.key]};opacity:0.8;"></div>`).join('');

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;font-family:Arial,sans-serif;">
        <div>
          <p style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:${col};margin:0 0 5px;">Practice Description</p>

        </div>

    </div>`;
  }).join('');
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Session Brief — ${team.name}</title>
<style>body{font-family:Arial,sans-serif;color:#1a1a1a;margin:0;padding:24px 32px;max-width:920px;}@page{margin:20mm 15mm;}@media print{body{padding:0;}}</style>
