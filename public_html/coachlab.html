  const [notes, setNotes] = useState('');
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const [apiKey, setApiKey] = useState(()=>{ try{return localStorage.getItem('cl_apikey')||'';}catch(e){return '';} });
  const [showKey, setShowKey] = useState(false);

  useEffect(()=>{ if(topFormation) setOurF(topFormation); },[topFormation]);
  useEffect(()=>{ try{localStorage.setItem('cl_apikey',apiKey);}catch(e){} },[apiKey]);

  async function analyse() {
    if (!oppF) { setErr('Select an opposition formation first'); return; }
    if (!apiKey.trim()) { setErr('Enter your Anthropic API key above to use this feature'); return; }
    setErr(''); setLoading(true); setResult(null);
    const squadNotes = notes.trim() || ('Squad of '+team.squad.length+' players. Age group: '+team.ageGroup+'.');
    const prompt = `You are an expert football tactics analyst advising a grassroots coach preparing for a match.
Squad profile: ${squadNotes}
Our formation: ${ourF}
Opposition formation: ${oppF}
Return ONLY a JSON object with no preamble or markdown fences:
{"summary":"2-3 sentence tactical overview of this ${ourF} vs ${oppF} matchup","our_strengths":["Specific advantage 1","Specific advantage 2","Specific advantage 3"],"our_vulnerabilities":["Specific risk 1 of playing ${ourF} vs ${oppF}","Risk 2","Risk 3"],"key_battle":"The single most important area or duel that will define this match","tactical_instruction":"One clear collective instruction for our players","counter_formations":[{"formation":"formation name","why":"2-sentence explanation why this better counters ${oppF}","key_change":"The single most important positional change vs our ${ourF}"},{"formation":"different formation","why":"2-sentence explanation","key_change":"Most important change"}]}`;
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey.trim(),'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-opus-4-5',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      if (!res.ok) { const e=await res.json(); throw new Error(e.error?.message||'API error '+res.status); }
      const data = await res.json();
      const text = (data.content||[])[0]?.text||'';
      setResult(JSON.parse(text.replace(/```json|```/g,'').trim()));
    } catch(e) {
      setErr('Error: '+(e.message||'Request failed. Check your API key and connection.'));
    } finally { setLoading(false); }
  }

  return (
    <div>
      <div style={{background:'rgba(31,111,235,.07)',border:'1px solid rgba(31,111,235,.2)',borderRadius:'6px',padding:'.65rem .9rem',marginBottom:'1rem',display:'flex',alignItems:'center',gap:'.75rem',flexWrap:'wrap'}}>
        <div style={{flex:1,minWidth:'200px'}}>
          <div style={{fontSize:'.69rem',fontWeight:700,color:'var(--bb)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.25rem'}}>Anthropic API Key</div>
          <div style={{display:'flex',gap:'.4rem',alignItems:'center'}}>
            <input className="inp" type={showKey?'text':'password'} placeholder="sk-ant-..." value={apiKey} onChange={e=>setApiKey(e.target.value)} style={{flex:1,fontFamily:'monospace',fontSize:'.78rem'}}/>
            <button className="btn btn-g btn-sm" onClick={()=>setShowKey(s=>!s)} style={{flexShrink:0}}>{showKey?'Hide':'Show'}</button>
          </div>
        </div>
        <div style={{fontSize:'.73rem',color:'var(--txt3)',maxWidth:'280px',lineHeight:1.5}}>
          Get a key at <span style={{color:'var(--bb)'}}>console.anthropic.com</span>. Saved locally in your browser — never sent anywhere except Anthropic's API.
        </div>
      </div>
      <p style={{color:'var(--txt2)',fontSize:'.81rem',marginBottom:'1rem'}}>Your squad data suggests <strong style={{color:'var(--gb)'}}>{topFormation||team.formation}</strong>. Enter what you expect the opposition to play — the analyser will assess the matchup and suggest counter-formations where beneficial.</p>
      <div className="g2" style={{marginBottom:'1rem'}}>
        <div className="card">
          <div className="ch"><span className="ct">Our Formation</span></div>
          <div className="cb">
            <div className="fgrp" style={{marginBottom:'.75rem'}}>
              <label className="lbl">Formation (defaults to squad recommendation)</label>
              <select className="sel" value={ourF} onChange={e=>setOurF(e.target.value)}>
                {availFormations.map(f=><option key={f}>{f}</option>)}
              </select>
            </div>
            <div className="fgrp">
              <label className="lbl">Squad profile notes (optional)</label>
              <textarea className="inp" rows={3} style={{resize:'vertical'}} placeholder="e.g. Strong in wide areas, creative midfield, striker pace is a key weapon. Back line can be slow to recover..." value={notes} onChange={e=>setNotes(e.target.value)}/>
            </div>
          </div>
        </div>
        <div className="card">
          <div className="ch"><span className="ct">Opposition Formation</span></div>
          <div className="cb">
            <div className="fgrp" style={{marginBottom:'1rem'}}>
              <label className="lbl">Expected opposition system</label>
              <select className="sel" value={oppF} onChange={e=>setOppF(e.target.value)}>
                <option value="">— Select opposition formation —</option>
                {(team.ageGroup==='U7-U10'?FORMATIONS_9:FORMATIONS_11).map(f=><option key={f}>{f}</option>)}
              </select>
            </div>
            {ourF&&oppF&&(
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:'1rem',padding:'.75rem',background:'var(--sur3)',borderRadius:'6px',marginBottom:'1rem'}}>
                <span style={{fontFamily:'Rajdhani',fontSize:'1.6rem',fontWeight:700,color:'var(--gb)'}}>{ourF}</span>
                <span style={{fontSize:'.78rem',color:'var(--txt3)',fontWeight:700,letterSpacing:'.06em'}}>VS</span>
                <span style={{fontFamily:'Rajdhani',fontSize:'1.6rem',fontWeight:700,color:'var(--rb)'}}>{oppF}</span>
              </div>
            )}
            <button className="btn btn-p" style={{width:'100%'}} onClick={analyse} disabled={loading||!oppF}>
              {loading?'Analysing matchup…':'⚡ Analyse This Matchup'}
            </button>
            {err&&<div style={{color:'var(--rb)',fontSize:'.77rem',marginTop:'.5rem'}}>{err}</div>}
          </div>
        </div>
      </div>

      {loading&&(
        <div className="card">
          <div className="cb" style={{textAlign:'center',padding:'2rem'}}>
            <div style={{color:'var(--gb)',fontWeight:600,marginBottom:'.35rem'}}>Analysing {ourF} vs {oppF}…</div>
            <div style={{fontSize:'.78rem',color:'var(--txt3)'}}>Assessing tactical matchup and building counter-formation options</div>
          </div>
        </div>
      )}

      {result&&(
        <div style={{display:'flex',flexDirection:'column',gap:'.85rem'}}>
          <div className="card" style={{borderLeft:'3px solid var(--gb)'}}>
            <div className="ch"><span className="ct">Matchup Overview — {ourF} vs {oppF}</span></div>
            <div className="cb">
              <p style={{fontSize:'.83rem',color:'var(--txt)',lineHeight:1.6,marginBottom:'.85rem'}}>{result.summary}</p>
              <div className="g2">
                <div style={{background:'var(--sur3)',borderRadius:'6px',padding:'.65rem .9rem'}}>
                  <div style={{fontSize:'.67rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.35rem'}}>Key Battle</div>
                  <div style={{fontSize:'.8rem',color:'var(--txt2)',lineHeight:1.5}}>{result.key_battle}</div>
                </div>
                <div style={{background:'var(--sur3)',borderRadius:'6px',padding:'.65rem .9rem'}}>
                  <div style={{fontSize:'.67rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:'.35rem'}}>Tactical Instruction</div>
                  <div style={{fontSize:'.8rem',color:'var(--txt2)',lineHeight:1.5}}>{result.tactical_instruction}</div>
                </div>
              </div>
            </div>
          </div>

          <div className="g2">
            <div className="card" style={{borderLeft:'3px solid var(--gb)'}}>
              <div className="ch"><span className="ct" style={{color:'var(--gb)'}}>✓ Strengths of Our {ourF}</span></div>
              <div className="cb">
                <ul style={{margin:0,paddingLeft:'1.1rem',color:'var(--txt2)',fontSize:'.8rem'}}>
                  {result.our_strengths.map((s,i)=><li key={i} style={{marginBottom:'.6rem',lineHeight:1.5}}>{s}</li>)}
                </ul>
              </div>
            </div>
            <div className="card" style={{borderLeft:'3px solid var(--rb)'}}>
              <div className="ch"><span className="ct" style={{color:'var(--rb)'}}>⚠ Vulnerabilities vs Their {oppF}</span></div>
              <div className="cb">
                <ul style={{margin:0,paddingLeft:'1.1rem',color:'var(--txt2)',fontSize:'.8rem'}}>
                  {result.our_vulnerabilities.map((v,i)=><li key={i} style={{marginBottom:'.6rem',lineHeight:1.5}}>{v}</li>)}
                </ul>
              </div>
            </div>
          </div>

          <div>
            <div style={{fontSize:'.72rem',fontWeight:700,color:'var(--txt3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:'.65rem'}}>Alternative Formations to Consider</div>
            <div className="g2">
              {result.counter_formations.map((cf,i)=>(
                <div key={i} className="card" style={{borderLeft:'3px solid var(--ob)'}}>
                  <div className="ch">
                    <span style={{fontFamily:'Rajdhani',fontSize:'1.3rem',fontWeight:700,color:'var(--ob)'}}>{cf.formation}</span>
                    <span className="bdg bdg-o" style={{marginLeft:'.5rem',fontSize:'.62rem'}}>OPTION {i+1}</span>
                  </div>
                  <div className="cb">
                    <p style={{fontSize:'.8rem',color:'var(--txt2)',lineHeight:1.55,marginBottom:'.65rem'}}>{cf.why}</p>
                    <div style={{background:'rgba(210,153,34,.08)',border:'1px solid rgba(210,153,34,.2)',borderRadius:'5px',padding:'.5rem .75rem',fontSize:'.77rem',color:'var(--ob)',lineHeight:1.45}}>
                      <strong>Key change:</strong> {cf.key_change}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  componentDidCatch(e,info){console.error('React error:',e,info);}
  render(){
    if(this.state.error) return(
      <div style={{padding:'2rem',fontFamily:'monospace',color:'#f85149',background:'#1a1f1e',minHeight:'100vh'}}>
        <div style={{fontSize:'1.2rem',fontWeight:'bold',marginBottom:'1rem'}}>⚠ Runtime Error</div>
        <pre style={{whiteSpace:'pre-wrap',fontSize:'.82rem',color:'#e3b341'}}>{this.state.error.toString()}</pre>
        <div style={{marginTop:'1rem',fontSize:'.78rem',color:'#8b949e'}}>Check browser console (F12) for full stack trace.</div>
      </div>
    );
    return this.props.children;
  }
}
ReactDOM.render(<ErrorBoundary><App/></ErrorBoundary>, document.getElementById('root'));
</script>
</body>
</html>
